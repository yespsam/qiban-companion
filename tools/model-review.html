<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Qiban model review</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #eef1f4;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      #status {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 2;
        padding: 6px 8px;
        color: #25303a;
        background: rgb(255 255 255 / 88%);
        border: 1px solid rgb(37 48 58 / 14%);
        border-radius: 4px;
        font: 12px/1.4 system-ui, sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="status">Loading model...</div>
    <script type="module">
      import * as THREE from '../desktop-wallpaper/vendor/three.module.js';
      import { GLTFLoader } from '../desktop-wallpaper/vendor/GLTFLoader.js';
      import { DRACOLoader } from '../desktop-wallpaper/vendor/DRACOLoader.js';

      const params = new URLSearchParams(location.search);
      const modelPath = params.get('model');
      const yaw = THREE.MathUtils.degToRad(Number(params.get('yaw') || 0));
      const focus = params.get('focus') || 'full';
      const clay = params.get('material') === 'clay';
      const status = document.querySelector('#status');

      const renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: false,
        preserveDrawingBuffer: true
      });
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.setSize(innerWidth, innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.08;
      document.body.append(renderer.domElement);

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0xeef1f4);
      const camera = new THREE.PerspectiveCamera(28, innerWidth / innerHeight, 0.01, 100);
      scene.add(new THREE.HemisphereLight(0xffffff, 0xa8b1ba, 2.3));
      const keyLight = new THREE.DirectionalLight(0xfff5eb, 3.5);
      keyLight.position.set(3, 4, 5);
      scene.add(keyLight);
      const fillLight = new THREE.DirectionalLight(0xd9e8ff, 2.2);
      fillLight.position.set(-4, 2, 3);
      scene.add(fillLight);

      const loader = new GLTFLoader();
      const draco = new DRACOLoader();
      draco.setDecoderPath('../desktop-wallpaper/vendor/');
      loader.setDRACOLoader(draco);

      if (!modelPath) {
        status.textContent = 'Missing ?model=...';
        throw new Error('A model query parameter is required.');
      }

      loader.load(
        `../${modelPath}`,
        ({ scene: model }) => {
          model.traverse((object) => {
            if (!object.isMesh && !object.isSkinnedMesh) return;
            if (clay) {
              if (!object.geometry.getAttribute('normal')) {
                object.geometry.computeVertexNormals();
              }
              const materialCount = Array.isArray(object.material)
                ? object.material.length
                : 1;
              const clayMaterials = Array.from(
                { length: materialCount },
                () => new THREE.MeshStandardMaterial({
                  color: 0xb9bdc4,
                  roughness: 0.82,
                  metalness: 0,
                  side: THREE.DoubleSide
                })
              );
              object.material = Array.isArray(object.material)
                ? clayMaterials
                : clayMaterials[0];
            }
            const materials = Array.isArray(object.material)
              ? object.material
              : [object.material];
            materials.filter(Boolean).forEach((material) => {
              if ('emissiveMap' in material) material.emissiveMap = null;
              if ('emissiveIntensity' in material) material.emissiveIntensity = 0;
              if (material.emissive) material.emissive.setHex(0x000000);
              if ('roughness' in material) material.roughness = 0.72;
              if ('metalness' in material) material.metalness = 0.02;
              material.needsUpdate = true;
            });
          });
          model.rotation.y = yaw;
          scene.add(model);
          model.updateMatrixWorld(true);

          const bounds = new THREE.Box3().setFromObject(model);
          const size = bounds.getSize(new THREE.Vector3());
          const center = bounds.getCenter(new THREE.Vector3());
          const portrait = focus === 'face';
          const target = portrait
            ? new THREE.Vector3(center.x, bounds.min.y + size.y * 0.87, center.z)
            : center;
          const subjectHeight = portrait ? size.y * 0.32 : size.y * 1.08;
          const distance = subjectHeight / (2 * Math.tan(THREE.MathUtils.degToRad(camera.fov / 2)));
          camera.position.set(target.x, target.y, target.z + distance);
          camera.lookAt(target);
          camera.near = Math.max(0.005, distance / 100);
          camera.far = distance * 20;
          camera.updateProjectionMatrix();

          status.textContent = `${focus} / yaw ${params.get('yaw') || 0}${clay ? ' / clay' : ''}`;
          renderer.render(scene, camera);
          document.documentElement.dataset.ready = 'true';
        },
        undefined,
        (error) => {
          status.textContent = 'Model load failed';
          console.error(error);
        }
      );

      addEventListener('resize', () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
        renderer.render(scene, camera);
      });
    </script>
  </body>
</html>
