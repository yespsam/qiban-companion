<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#111614">
  <title>栖伴 · 3D 桌面壁纸</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%2307c160'/%3E%3Ctext x='32' y='42' text-anchor='middle' font-size='34' fill='white'%3E%E6%A0%96%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="wallpaper" aria-label="栖伴 3D 桌面壁纸">
    <canvas id="scene" aria-hidden="true"></canvas>
    <section class="presence">
      <p class="eyebrow">desktop companion</p>
      <h1 id="name">小栖</h1>
      <p id="line">我在桌面旁边，等你随时叫我。</p>
    </section>
    <section class="dock" aria-label="桌面伴侣控制">
      <button class="dock-btn active" id="female-btn" type="button">小栖</button>
      <button class="dock-btn" id="male-btn" type="button">栖安</button>
      <span id="server-state" class="server-state">local standby</span>
    </section>
  </main>
  <script type="module" src="./app.js"></script>
</body>
</html>
