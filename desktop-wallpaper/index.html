<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#000000">
  <title>栖伴 · 3D 桌面壁纸</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%2307c160'/%3E%3Ctext x='32' y='42' text-anchor='middle' font-size='34' fill='white'%3E%E6%A0%96%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="./style.css?v=v0.2.5-skins">
</head>
<body>
  <main class="wallpaper" aria-label="栖伴 3D 桌面壁纸">
    <canvas id="scene" aria-hidden="true"></canvas>
    <section class="presence">
      <p class="eyebrow">qiban companion</p>
      <h1 id="name">小栖</h1>
      <p id="line">我在桌面旁边，等你随时叫我。</p>
    </section>
    <section class="dock" aria-label="桌面伴侣控制">
      <button class="menu-toggle" id="menu-btn" type="button" aria-label="打开控制" aria-expanded="false">
        <span class="menu-line"></span>
        <span class="menu-line"></span>
        <span class="menu-line"></span>
      </button>
      <div class="dock-panel" id="dock-panel">
      <div class="dock-group primary-controls" aria-label="角色和对话">
        <button class="dock-btn active" id="female-btn" type="button">小栖</button>
        <button class="dock-btn" id="male-btn" type="button">栖安</button>
        <button class="dock-btn" id="builder-btn" type="button" aria-expanded="false">造型</button>
        <button class="dock-btn" id="dialog-btn" type="button" aria-pressed="false">对话关</button>
        <button class="dock-btn" id="voice-btn" type="button" aria-expanded="false">声线</button>
      </div>
      <div class="dock-group actions" aria-label="动作">
        <button class="dock-btn active" type="button" data-action="idle">待机</button>
        <button class="dock-btn" type="button" data-action="wave">挥手</button>
        <button class="dock-btn" type="button" data-action="nod">点头</button>
        <button class="dock-btn" type="button" data-action="walk">散步</button>
        <button class="dock-btn" type="button" data-action="run">奔跑</button>
        <button class="dock-btn" type="button" data-action="turn">转身</button>
        <button class="dock-btn" type="button" data-action="heart">回应</button>
        <button class="dock-btn" type="button" data-action="voice">声音</button>
      </div>
      <span id="server-state" class="server-state">待机</span>
      </div>
    </section>
    <section class="voice-panel" id="voice-panel" aria-label="声线选择" hidden></section>
    <section class="builder-panel" id="builder-panel" aria-label="形象生成" hidden></section>
  </main>
  <script type="module" src="./app.js?v=v0.2.5-skins"></script>
</body>
</html>
